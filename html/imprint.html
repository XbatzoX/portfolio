<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal notice</title>

    <link rel="shortcut icon" href="../assets/icons/Logo icon.svg" type="image/x-icon">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/nav.css">
    <link rel="stylesheet" href="../styles/imprint.css">
    <script src="../scripts/imprintObj.js"></script>
    <script src="../scripts/projectsObj.js"></script>
    <script src="../scripts/language.js"></script>
    <script src="../scripts/imprint.js"></script>
    <script src="../script.js"></script> 
</head>
<body onload="initImprint()" onclick="closeNavOverlayImprint()">
    <header>
        <nav id="imprint_nav">
            <div class="nav-container">
                <div class="nav-logo" onclick="goToHeroPage()">
                    <img src="../assets/icons/Logo icon nav.svg" alt="main logo icon">
                    <span class="logo-nav-name">B.Mahalbasic</span>
                    <span class="logo-nav-text">developer</span>
                </div>
                <div class="nav-link-container">
                    <div id="why_me" class="link-bg">
                        <a id="link_why_me" class="nav-links" href="../index.html#why_me_section" onclick="onFocusDesign('why_me', 'link_why_me')">Warum ich</a>
                    </div>
                    <div id="skills" class="link-bg">
                        <a id="link_skills" class="nav-links" href="../index.html#my_skills_section" onclick="onFocusDesign('skills', 'link_skills')">Fähigkeiten</a>
                    </div>
                    <div id="projects" class="link-bg">
                        <a id="link_projects" class="nav-links" href="../index.html#my_projects_section" onclick="onFocusDesign('projects', 'link_projects')">Projekte</a>
                    </div>
                    <div id="contact" class="link-bg">
                        <a id="link_contact" class="nav-links" href="../index.html#my_contact_section" onclick="onFocusDesign('contact', 'link_contact')">Kontakt</a>
                    </div>
                </div>
                <div class="language-container">
                    <div id="german" class="language-bg">
                        <span id="german_span" class="language-box" onclick="loadImprintLanguage('german', 'german_span')"
                        onmouseover="onHoverLanguageDesign('german')" onmouseout="hoverOverLanguageDesign()">DE</span>
                    </div>
                    <div id="english" class="language-bg">
                        <span id="english_span" class="language-box" onclick="loadImprintLanguage('english', 'english_span')"
                        onmouseover="onHoverLanguageDesign('english')" onmouseout="hoverOverLanguageDesign()">EN</span>
                    </div>
                </div>
            </div>
        </nav>
        <div id="header_mobile" class="header-mobile">
            <div class="header-frame">
                <div class="logo-main-box">
                    <img class="main-logo" src="../assets/icons/mobile/logo_mobile.svg" alt="logo icon">
                    <span class="main-name">B.Mahalbasic</span>
                    <span class="job-name">developer</span>
                </div>
                <div class="burger-menu" onclick="toggleMobileNavImprint(event)">
                    <img id="mobile_nav_btn" src="../assets/icons/mobile/burger_button.svg" alt="navbar button as burger icon">
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="mobile-nav-imprint">
            <div id="nav_mobile" class="nav-mobile-container invisible">
                <div class="nav-mobile" onclick="stopEventBubbling(event)">
                    <div class="mobile-link-container">
                        <a id="link_why_me_mobile" class="mobile-link" href="../index.html#why_me_section"></a>
                        <a id="link_my_skills_mobile" class="mobile-link" href="../index.html#my_skills_section"></a>
                        <a id="link_my_projects_mobile" class="mobile-link" href="../index.html#my_projects_section"></a>
                        <a id="link_contact_me_mobile" class="mobile-link" href="../index.html#my_contact_section"></a>
                        <div class="mobile-language-container">
                            <div id="german_mobile" class="mobile-language-box">
                                <span id="german_span_mobile" class="mobile-language-span" onclick="loadImprintLanguage('german', 'german_span')"
                                onmouseover="onHoverLanguageDesign('german')" onmouseout="hoverOverLanguageDesign()">DE</span>
                            </div>
                            <div id="english_mobile" class="mobile-language-box">
                                <span id="english_span_mobile" class="mobile-language-span" onclick="loadImprintLanguage('english', 'english_span')"
                                onmouseover="onHoverLanguageDesign('english')" onmouseout="hoverOverLanguageDesign()">EN</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="imprint-frame">
            <div class="imprint-container">
                <div class="arrow-left-frame">
                    <div class="arrow-left-btn" onclick="goToHeroPage()">
                        <img src="../assets/icons/mobile/arrow_left_mobile.svg" alt="go to hero page as arrow left button">
                    </div>
                </div>
                <span id="imprint_caption" class="imprint-caption"></span>
                <div class="imprint-list-container">
                    <span id="list_caption" class="imprint-line"></span>
                    <ul class="imprint-list">
                        <li>Benjamin Mahalbasic</li>
                        <li>Ratzeburger Allee 86</li>
                        <li>23562 Lübeck</li>
                    </ul>
                </div>
                <div class="content-box">
                    <span id="contact_span" class="imprint-line"></span>
                    <span class="imprint-content">Email: benbasic@outlook.de</span>
                </div>
                <div class="content-box">
                    <span id="terms_span" class="imprint-line"></span>
                    <span id="terms_content" class="imprint-content"></span>
                </div>
                <div class="content-box">
                    <span id="scope_span" class="imprint-line"></span>
                    <span id="scope_content" class="imprint-content"></span>
                </div>
                <div class="content-box">
                    <span id="rights_span" class="imprint-line"></span>
                    <span id="rights_content" class="imprint-content"></span>
                </div>
                <div class="content-box">
                    <span id="use_span" class="imprint-line"></span>
                    <span id="use_content" class="imprint-content"></span>
                </div>
                <div class="content-box">
                    <span id="disclaim_span" class="imprint-line"></span>
                    <span id="disclaim_content" class="imprint-content"></span>
                </div>
                <div class="content-box">
                    <span id="indemnity_span" class="imprint-line"></span>
                    <span id="indemnity_content" class="imprint-content"></span>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-frame">
            <div class="footer-container">
                <div class="footer-left-side">
                    <div class="footer-link-container"></div>
                    <span>&copy; Benjamin Mahalbasic 2026</span>
                </div>
                <div class="footer-logo" onclick="scrollToTop()">
                    <img src="../assets/icons/Logo icon nav.svg" alt="main logo icon">
                    <span class="logo-nav-name">B.Mahalbasic</span>
                    <span class="logo-nav-text">developer</span>
                </div>
                <div class="footer-right-side">
                    <img id="mail_footer" src="../assets/icons/mail_icon_footer.svg" alt="mail link bitton as letter icon"
                    onmouseover="changeIcon('mail_footer', '../assets/icons/mail_icon_footer_hover.svg')" onmouseout="changeIcon('mail_footer', '../assets/icons/mail_icon_footer.svg')"
                    onclick="goToContactSection()">
                    <img id="github_footer" src="../assets/icons/github_icon_footer.svg" alt="github icon as link button"
                    onmouseover="changeIcon('github_footer', '../assets/icons/github_icon_footer_hover.svg')" onmouseout="changeIcon('github_footer', '../assets/icons/github_icon_footer.svg')"
                    onclick="openWebsite('https://github.com/XbatzoX')">
                    <img id="linkedin_footer" src="../assets/icons/linkedin_icon_footer.svg" alt="linkedIn icon as link button"
                    onmouseover="changeIcon('linkedin_footer', '../assets/icons/linkedin_icon_footer_hover.svg')" onmouseout="changeIcon('linkedin_footer', '../assets/icons/linkedin_icon_footer.svg')">
                </div>
            </div>
            <div class="footer-container-mobile">
                <div class="footer-logo" onclick="scrollToTop()">
                    <img src="../assets/icons/Logo icon nav.svg" alt="main logo icon">
                    <span class="logo-nav-name">B.Mahalbasic</span>
                    <span class="logo-nav-text">developer</span>
                </div>
                <div class="footer-ctrl-mobile">
                    <img id="github_footer_mobile" class="footer-icon-mobile" src="../assets/icons/mobile/footer_github_mobile.svg" alt="github icon as link button"
                    onclick="githubImprintFooterAction()">
                    <img id="mail_footer_mobile" class="footer-icon-mobile" src="../assets/icons/mobile/footer_mail_mobile.svg" alt="mail link bitton as letter icon"
                    onclick="goToContactSection()">
                    <img id="linkedin_footer_mobile" class="footer-icon-mobile" src="../assets/icons/mobile/footer_linkedin_mobile.svg" alt="linkedIn icon as link button">
                </div>
                <div class="footer-description-mobile">
                    <span class="copyright-span">&copy; Benjamin Mahalbasic 2026</span>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
