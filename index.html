<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benjamin-Mahalbasic</title>

    <link rel="shortcut icon" href="./assets/icons/Logo icon.svg" type="image/x-icon">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <section class="hero-section">
            <div class="hero-container">
                <div class="hero-content">
                    <div class="portrait-frame">
                        <img class="person-image" src="./assets/img/ich.png" alt="picture of me">
                        <img class="portrait-bg-image" src="./assets/img/shape.svg">
                    </div>
                    <div class="main-indication-container">
                        <div class="logo-container">
                            <div class="logo-main-box">
                                <img class="main-logo" src="./assets/icons/Logo icon.svg" alt="logo icon">
                                <span class="main-name">B.Mahalbasic</span>
                                <span class="job-name">developer</span>
                            </div>
                            <div class="main-link-container">
                                <img class="link-icons" src="./assets/icons/Email button.svg" alt="e-mail button with letter icon">
                                <img class="link-icons" src="./assets/icons/Github button.svg" alt="github button with github icon">
                                <img class="link-icons" src="./assets/icons/Linkedin button.svg" alt="linkedIn button with letter icon">
                            </div>
                        </div>
                    </div>
                </div>
                <nav></nav>
            </div>
        </section>
        
    </main>
    <footer></footer>
</body>
</html>
